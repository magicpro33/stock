name: Money Flow Engine

# Runs after your nightly stock-data workflow finishes, so the engine always
# scores the freshest dump. Fallback cron included in case the workflow_run
# trigger fails for any reason — delete whichever trigger you don't want.
# Trigger name verified against magicpro33/stock: "Nightly Stock Scan"
# (.github/workflows/nightly_scan.yml, runs 07:00 UTC weekdays).

on:
  workflow_run:
    workflows: ["Nightly Stock Scan"]
    types: [completed]
  schedule:
    - cron: "30 8 * * 1-5"   # 08:30 UTC weekdays, ~90 min after Nightly Stock Scan (07:00 UTC) as a fallback
  workflow_dispatch: {}        # manual "Run workflow" button

permissions:
  contents: write

concurrency:
  group: money-flow
  cancel-in-progress: true

jobs:
  money-flow:
    runs-on: ubuntu-latest
    # if triggered by workflow_run, only proceed when the nightly job succeeded
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install numpy pandas

      - name: Run Money Flow Engine
        run: |
          python money_flow_engine.py data/stock_data.json.gz \
            --top-sectors 3 --picks 25 \
            --csv data/money_flow_picks.csv

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/money_flow_picks.csv data/money_flow_picks_sectors.json
          git diff --staged --quiet || git commit -m "Money flow picks $(date -u +%F)"
          git push
